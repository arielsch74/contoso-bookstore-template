<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contoso Bookstore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .cover { width: 50px; height: 70px; object-fit: cover; }
        .rating { color: #f5b50a; }
        body { background: #f8f9fa; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1">📚 <span id="appName">Contoso Bookstore</span></span>
        <span class="badge bg-secondary" id="envBadge">Loading…</span>
    </div>
</nav>

<div class="container">
    <div class="row mb-4">
        <div class="col">
            <h2>Books</h2>
        </div>
        <div class="col-auto">
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addBookModal">+ Add book</button>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th id="th-cover" style="display:none">Cover</th>
                        <th>Title</th>
                        <th>Author</th>
                        <th>Year</th>
                        <th>Price</th>
                        <th id="th-rating" style="display:none">Rating</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="books-body"></tbody>
            </table>
        </div>
    </div>
    <p class="text-muted small mt-2">Feature flag <code>NewBookListing</code>: <span id="flagState" class="badge bg-secondary">unknown</span></p>
</div>

<!-- Modal add book -->
<div class="modal fade" id="addBookModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add book</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="addBookForm">
                    <div class="mb-2"><label class="form-label">Title</label><input class="form-control" name="Title" required></div>
                    <div class="mb-2"><label class="form-label">ISBN</label><input class="form-control" name="Isbn" required></div>
                    <div class="mb-2"><label class="form-label">Author</label>
                        <select class="form-select" name="AuthorId" id="author-select" required></select>
                    </div>
                    <div class="row">
                        <div class="col mb-2"><label class="form-label">Year</label><input type="number" class="form-control" name="PublishedYear" required></div>
                        <div class="col mb-2"><label class="form-label">Price</label><input type="number" step="0.01" class="form-control" name="Price" required></div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary" id="saveBookBtn">Save</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const api = '/api';
let newBookListing = false;

async function loadConfig() {
    const r = await fetch(`${api}/config`);
    const cfg = await r.json();
    newBookListing = !!cfg.NewBookListing;
    document.getElementById('appName').textContent = cfg.AppName;
    document.getElementById('envBadge').textContent = cfg.Environment;
    document.getElementById('flagState').className = newBookListing ? 'badge bg-success' : 'badge bg-secondary';
    document.getElementById('flagState').textContent = newBookListing ? 'ON' : 'OFF';
    if (newBookListing) {
        document.getElementById('th-cover').style.display = '';
        document.getElementById('th-rating').style.display = '';
    }
}

async function loadBooks() {
    const r = await fetch(`${api}/books`);
    const books = await r.json();
    const body = document.getElementById('books-body');
    body.innerHTML = books.map(b => `
        <tr>
            ${newBookListing ? `<td>${b.coverImageUrl ? `<img class="cover" src="${b.coverImageUrl}" alt="cover">` : ''}</td>` : ''}
            <td><strong>${b.title}</strong><br><small class="text-muted">${b.isbn}</small></td>
            <td>${b.authorName}</td>
            <td>${b.publishedYear}</td>
            <td>$${b.price.toFixed(2)}</td>
            ${newBookListing ? `<td><span class="rating">${b.rating ? '★'.repeat(Math.round(b.rating)) : ''}</span> ${b.rating || ''}</td>` : ''}
            <td><button class="btn btn-sm btn-outline-danger" onclick="deleteBook(${b.id})">Delete</button></td>
        </tr>
    `).join('');
}

async function loadAuthors() {
    const r = await fetch(`${api}/authors`);
    const authors = await r.json();
    const sel = document.getElementById('author-select');
    sel.innerHTML = authors.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
}

async function deleteBook(id) {
    if (!confirm('Delete this book?')) return;
    await fetch(`${api}/books/${id}`, { method: 'DELETE' });
    loadBooks();
}

document.getElementById('saveBookBtn').addEventListener('click', async () => {
    const form = document.getElementById('addBookForm');
    const fd = new FormData(form);
    const body = Object.fromEntries(fd);
    body.Price = parseFloat(body.Price);
    body.PublishedYear = parseInt(body.PublishedYear);
    body.AuthorId = parseInt(body.AuthorId);
    const r = await fetch(`${api}/books`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    if (r.ok) {
        bootstrap.Modal.getInstance(document.getElementById('addBookModal')).hide();
        form.reset();
        loadBooks();
    } else {
        alert('Error: ' + await r.text());
    }
});

(async () => {
    await loadConfig();
    await loadAuthors();
    await loadBooks();
})();
</script>
</body>
</html>
